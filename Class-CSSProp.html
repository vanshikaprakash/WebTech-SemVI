<!DOCTYPE html>
<html>
<head>
<title>Border Radius, Z-Index & 3D Rotate</title>

<style>

body{
    font-family: Arial;
    background-color: #f6f6f6;
    text-align: center;
}

/* IMPORTANT for 3D effect */
.zindex-border{
    position: relative;
    width: 380px;
    height: 220px;
    margin: 40px auto;
    border: 3px dashed #888;
    perspective: 600px;   /* gives depth */
}

.box1{
    width: 650px;
    padding: 20px;
    border: 6px solid #ff4d6d;
    border-radius: 45px;
    margin: 30px auto;
    font-size: 18px;
    text-shadow: 2px 2px 4px gray;
    background-color: white;
}

.box2{
    width: 650px;
    padding: 20px;
    border: 6px solid #4c6ef5;
    border-radius: 60px 20px;
    margin: 30px auto;
    font-size: 18px;
    text-shadow: 2px 2px 4px gray;
    background-color: white;
}

h2{
    color: #000000;
    text-shadow: 2px 2px 3px rgb(255, 149, 149);
}

.zitem{
    position: absolute;
    width: 180px;
    height: 110px;
    color: #fff;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 3D ROTATION */

.z1{
    top: 20px;
    left: 20px;
    background: #ffea61;
    z-index: 1;
    transform: rotateX(45deg);
}

.z2{
    top: 55px;
    left: 95px;
    background: #a0cfff;
    z-index: 2;
    transform: rotateY(45deg);
}

.z3{
    top: 90px;
    left: 170px;
    background: #ad92ff;
    z-index: 3;
    transform: rotateX(30deg) rotateY(30deg);
}

</style>
</head>

<body>

<h2>Vanshika Prakash, 23SCS1011128</h2>

<div class="box1">
CSS allows us to create smooth rounded corners using the border-radius property.
</div>

<div class="box2">
Using multiple border-radius values lets us design creative shapes.
</div>

<h2>Z-Index + 3D Rotate Example</h2>

<div class="zindex-border">
    <div class="zitem z1">Hi</div>
    <div class="zitem z2">Its me</div>
    <div class="zitem z3">Vanshika</div>
</div>

</body>
</html>
