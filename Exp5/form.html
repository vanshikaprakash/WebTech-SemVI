<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form</title>
</head>
<body>

    <h2>Student Details Form</h2>

    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="rollnumber">Roll Number:</label>
        <input type="text" id="rollnumber" name="rollnumber"><br><br>

        <label>Choose Subjects:</label><br>
        <input type="checkbox" id="Aptitude" name="subject" value="Aptitude">
        <label for="Aptitude">Aptitude</label><br>

        <input type="checkbox" id="Software Engineering" name="subject" value="Software Engineering">
        <label for="Software Engineering">Software Engineering</label><br>

        <input type="checkbox" id="Compiler design" name="subject" value="Compiler design">
        <label for="Compiler design">Compiler design</label><br>

        <input type="checkbox" id="DSA" name="subject" value="DSA">
        <label for="DSA">DSA</label><br><br>

        <input type="submit" value="Submit">
    </form>

</body>
</html>
